    <style>
        /* Define colors as variables */
        :root {
            --primary-color: #ffcc00;
            /* Yellow */
            --dark-bg: #333;
            /* Dark background */
            --red: #660000;
            /* Red */
            --light-red: #ff3333;
            /* Light Red */
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .navbar-brand:hover {
            color: #ffcc00;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .card {
            width: 50%;
            text-align: center;
            margin: 0 auto;
            background-color: var(--dark-bg);
            border: 1px solid var(--primary-color);
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .choose-image {
            margin-top: 73%;
            margin-left: 59%;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            /* Để căn chỉnh các label sang phải */
        }

        .form-group label {
            display: inline-block;
        }

        .insert {
            padding: 20px 8px;
        }

        .btn-primary,
        .btn-danger {
            border-radius: 10px;
        }

        .btn-primary:hover {
            background-color: var(--light-red);
            border-color: var(--light-red);
        }

        .btn-danger {
            background-color: var(--light-red);
        }

        .btn-danger:hover {
            background-color: var(--red);
        }

        /* Custom styles for image preview */
        #preview-image {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
        }

        /* Custom style for form input */
        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 1px solid #ccc;
            display: inline-block;
            padding: 6px 12px;
            cursor: pointer;
            background-color: var(--dark-bg);
            color: white;
            border-radius: 5px;
        }

        .custom-file-upload:hover {
            background-color: var(--primary-color);
            color: #1a1a1a;
        }
        #preview-video {
            margin-bottom: 10px;
        }
    </style>
</head>

    <div class="container">
        <div class="card my-5 p-4">
            <h2 class="card-title text-center">Thêm mới phim</h2>
            <form id="addMovieForm">
                <!-- Form content -->
                <div class="form-group">
                    <div class="row">
                        <div class="col-md-6">
                            <label for="preview-image"></label>
                            <img src="#" id="preview-image" class="img-fluid">
                        </div>
                        <div class="col-md-6">
                            <label id="movie-image-label" for="movie-image" class="custom-file-upload choose-image">
                                Chọn ảnh
                            </label>
                            <input type="file" class="form-control-file" id="movie-image">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="movie-title">Tên phim:</label>
                    <input type="text" class="form-control insert" id="movie-title" placeholder="Nhập tên phim">
                </div>
                <div class="form-group">
                    <label for="movie-genre">Thể loại:</label>
                    <input type="text" class="form-control insert" id="movie-genre" placeholder="Nhập thể loại">
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="movie-release-date">Khởi chiếu:</label>
                        <input type="text" class="form-control insert" id="movie-release-date"
                            placeholder="Nhập ngày khởi chiếu">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="movie-duration">Thời lượng:</label>
                        <input type="text" class="form-control insert" id="movie-duration"
                            placeholder="Nhập thời lượng">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="movie-director">Đạo diễn:</label>
                        <input type="text" class="form-control insert" id="movie-director"
                            placeholder="Nhập tên đạo diễn">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="movie-actor">Diễn viên:</label>
                        <input type="text" class="form-control insert" id="movie-actor"
                            placeholder="Nhập tên diễn viên">
                    </div>
                </div>
                    <div class="form-group">
                        <label for="movie-price">Gía vé:</label>
                        <input type="text" class="form-control insert" id="movie-price" placeholder="Nhập giá">
                    </div>
                <div class="form-group">
                    <label for="movie-trailer">Trailer:</label>
                    <div class="input-group">
                        <div class="custom-file">
                            <input type="file" class="custom-file-input" id="movie-trailer" accept="video/*">
                            <label class="custom-file-label" for="movie-trailer">Chọn file</label>
                        </div>
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" onclick="clearTrailer()">Xóa</button>
                        </div>
                    </div>
                </div>
                <div id="message"></div>

                <!-- Thêm thẻ video vào đây -->
                <video controls id="preview-video" class="mt-2" style="max-width: 100%; display: none;"></video>
                
                <button type="submit" class="btn btn-primary">Xác nhận</button>
                <a href="admin.html" class="btn btn-danger">Hủy</a>
            </form>
        </div>
    </div>
