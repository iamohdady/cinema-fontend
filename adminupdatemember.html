<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Admin Page - Chỉnh sửa phim</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
    <style>
        :root {
            --primary-color: #ffcc00;
            --dark-bg: #333;
            --red: #660000;
            --light-red: #ff3333;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: var(--dark-bg);
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .navbar-brand:hover {
            color: #ffcc00;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
        }

        .vertical-navbar {
            background-color: var(--dark-bg);
            width: 15%;
            float: left;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
        }

        .vertical-navbar .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .vertical-navbar .navbar-nav {
            margin-top: 20%;
            margin-bottom: 20%;
        }

        .vertical-navbar .nav-link {
            margin-top: 5%;
            margin-bottom: 10%;
            padding: 15px 11px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .vertical-navbar .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .card {
            width: 50%;
            text-align: center;
            margin: 0 auto;
            background-color: var(--dark-bg);
            border: 1px solid var(--primary-color);
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: inline-block;
        }

        .insert {
            padding: 20px 8px;
        }

        .btn-primary,
        .btn-danger {
            border-radius: 10px;
        }

        .btn-primary:hover {
            background-color: var(--light-red);
            border-color: var(--light-red);
        }

        .btn-danger {
            background-color: var(--light-red);
        }

        .btn-danger:hover {
            background-color: var(--red);
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 1px solid #ccc;
            display: inline-block;
            padding: 6px 12px;
            cursor: pointer;
            background-color: var(--dark-bg);
            color: white;
            border-radius: 5px;
        }

        .custom-file-upload:hover {
            background-color: var(--primary-color);
            color: #1a1a1a;
        }

        #preview-image {
            border-radius: 50%;
        }

    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">TUZZCNM</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item active">
                        <a class="nav-link" href="home.html">WEB</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./about.html">TIN TỨC & SỰ KIỆN</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./about.html">CINEMAS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./detailinfo.html">MEMBER</a>
                    </li>
                    <li class="nav-item" id="nav-login">
                        <a class="nav-link" href="login.html">ĐĂNG NHẬP</a>
                    </li>
                    <li class="nav-item" id="nav-register">
                        <a class="nav-link" href="register.html">ĐĂNG KÝ</a>
                    </li>
                    <li class="nav-item" id="nav-logout">
                        <a class="nav-link" href="login.html">ĐĂNG XUẤT</a>
                    </li>
                    <li class="nav-item" id="nav-welcome">
                        <span class="nav-link">Xin chào, <span id="username"></span>!</span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="card my-5 p-4">
            <h2 class="card-title text-center">Chỉnh sửa thông tin</h2>
            <form id="updateUserForm">
                <div class="form-group">
                    <label for="user-avatar" class="custom-file-upload choose-image">
                        Chọn ảnh đại diện
                    </label>
                    <input type="file" class="form-control-file" id="user-avatar">
                </div>
                <div style="width: 150px; height: 150px; overflow: hidden; margin: 5% auto;">
                    <img id="preview-avatar" src="#" alt="Ảnh xem trước"
                        style="max-width: 100%; max-height: 100%; display: block; margin: auto; border-radius: 50%;">
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="user-fullname">Họ và tên:</label>
                        <input type="text" class="form-control insert" id="user-fullname" placeholder="Nhập họ và tên">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="user-username">Tên đăng nhập:</label>
                        <input type="text" class="form-control insert" id="user-username"
                            placeholder="Nhập tên đăng nhập">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="user-password">Mật khẩu:</label>
                        <input type="password" class="form-control insert" id="user-password"
                            placeholder="Nhập mật khẩu">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="user-birthday">Ngày sinh:</label>
                        <input type="text" class="form-control insert" id="user-birthday"
                            placeholder="Nhập ngày sinh (DD/MM/YYYY)">
                    </div>
                </div>
                <div class="form-group">
                    <label for="user-email">Email:</label>
                    <input type="email" class="form-control insert" id="user-email" placeholder="Nhập email">
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="user-phone">Số điện thoại:</label>
                        <input type="text" class="form-control insert" id="user-phone" placeholder="Nhập phone">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="user-address">Địa chỉ:</label>
                        <input type="text" class="form-control insert" id="user-address" placeholder="Nhập địa chỉ">
                    </div>
                </div>
                <div class="form-group">
                    <label for="user-role">Vai trò:</label>
                    <input type="text" class="form-control insert" id="user-role" placeholder="Nhập role">
                </div>
                <div id="message"></div>
                <button type="submit" class="btn btn-primary">Xác nhận</button>
                <a href="adminmember.html" class="btn btn-danger">Hủy</a>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./adminupdatemember.js"></script>
</body>

</html>
