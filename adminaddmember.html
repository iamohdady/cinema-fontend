    <style>
        /* Define colors as variables */
        :root {
            --primary-color: #ffcc00;
            /* Yellow */
            --dark-bg: #333;
            /* Dark background */
            --red: #660000;
            /* Red */
            --light-red: #ff3333;
            /* Light Red */
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .navbar-brand:hover {
            color: #ffcc00;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
        }

        .navbar {
            background-color: var(--dark-bg);
        }

        .vertical-navbar {
            background-color: var(--dark-bg);
            width: 15%;
            float: left;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
        }
        
        .vertical-navbar .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .vertical-navbar .navbar-nav {
            margin-top: 20%;
            margin-bottom: 20%;
        }

        .vertical-navbar .nav-link {
            margin-top: 5%;
            margin-bottom: 10%;
            padding: 15px 11px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .vertical-navbar .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .card {
            width: 50%;
            text-align: center;
            margin: 0 auto;
            background-color: var(--dark-bg);
            border: 1px solid var(--primary-color);
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
            text-transform: uppercase;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            /* Để căn chỉnh các label sang phải */
        }

        .form-group label {
            display: inline-block;
        }

        .insert {
            padding: 20px 8px;
        }

        .btn-primary,
        .btn-danger {
            border-radius: 10px;
        }

        .btn-primary:hover {
            background-color: var(--light-red);
            border-color: var(--light-red);
        }

        .btn-danger {
            background-color: var(--light-red);
        }

        .btn-danger:hover {
            background-color: var(--red);
        }

        /* Custom style for form input */
        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 1px solid #ccc;
            display: inline-block;
            padding: 6px 12px;
            cursor: pointer;
            background-color: var(--dark-bg);
            color: white;
            border-radius: 5px;
        }

        .custom-file-upload:hover {
            background-color: var(--primary-color);
            color: #1a1a1a;
        }

        #preview-image {
            border-radius: 50%;
        }

    </style>
</head>

                <form id="search-form" class="form-inline">
                    <div class="input-group">
                        <input id="search-input" class="form-control mr-sm-2" type="search" placeholder="Tìm kiếm"
                            aria-label="Tìm kiếm">
                        <div class="input-group-append">

    <div class="container">
        <div class="card my-5 p-4">
            <h2 class="card-title text-center">Thêm mới người dùng</h2>
            <form id="addUserForm">
                <!-- Form content -->
                <div class="form-group">
                    <label for="user-avatar" class="custom-file-upload choose-image">
                        Chọn ảnh đại diện
                    </label>
                    <input type="file" class="form-control-file" id="user-avatar" onchange="previewAvatar(this)">
                </div>
                <div style="width: 150px; height: 150px; overflow: hidden; margin: 5% auto;">
                    <!-- Thẻ img hiển thị ảnh xem trước -->
                    <img id="preview-avatar" src="#" alt="Ảnh xem trước" style="max-width: 100%; max-height: 100%; display: block; margin: auto; border-radius: 50%;">
                </div>
                
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="user-fullname">Họ và tên:</label>
                        <input type="text" class="form-control insert" id="user-fullname" placeholder="Nhập họ và tên">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="user-username">Tên đăng nhập:</label>
                        <input type="text" class="form-control insert" id="user-username"
                            placeholder="Nhập tên đăng nhập">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="user-password">Mật khẩu:</label>
                        <input type="password" class="form-control insert" id="user-password"
                            placeholder="Nhập mật khẩu">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="user-birthday">Ngày sinh:</label>
                        <input type="text" class="form-control insert" id="user-birthday"
                            placeholder="Nhập ngày sinh (DD/MM/YYYY)">
                    </div>
                </div>
                <div class="form-group">
                    <label for="user-email">Email:</label>
                    <input type="email" class="form-control insert" id="user-email" placeholder="Nhập email">
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="user-phone">Số điện thoại:</label>
                        <input type="text" class="form-control insert" id="user-phone" placeholder="Nhập phone">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="user-address">Địa chỉ:</label>
                        <input type="text" class="form-control insert" id="user-address" placeholder="Nhập địa chỉ">
                    </div>
                </div>
                <!-- <div class="form-group">
                    <label for="user-role">Vai trò:</label>
                    <select class="form-control" id="user-role">
                        <option value="MEMBER">MEMBER</option>
                        <option value="STAFF">STAFF</option>
                    </select>
                </div> -->
                <div class="form-group">
                    <label for="user-role">Vai trò:</label>
                    <input type="text" class="form-control insert" id="user-role" placeholder="Nhập role">
                </div>
                <div id="message"></div>

                <button type="submit" class="btn btn-primary">Xác nhận</button>
                <a href="adminaddmember.html" class="btn btn-danger">Hủy</a>
            </form>
        </div>
